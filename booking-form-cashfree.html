<style>
    /* Force box sizing to prevent layout breakage */
    .custom-booking-wrapper, .custom-booking-wrapper * {
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    :root {
        --primary: #d35400;
        --primary-hover: #e67e22;
        --secondary: #2c3e50;
        --input-bg: #fdfdfd;
        --border-color: #e0e0e0;
    }

    .custom-booking-wrapper {
        width: 100%;
        margin: 0 auto;
        padding: 10px;
    }

    .custom-booking-card {
        background: #ffffff;
        padding: 35px;
        border-radius: 16px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.08);
        border-top: 6px solid var(--primary);
        max-width: 1000px;
        margin: 0 auto;
    }

    .booking-header {
        text-align: center;
        margin-bottom: 30px;
        border-bottom: 1px solid #f0f0f0;
        padding-bottom: 20px;
    }

    .booking-header h3 {
        color: var(--secondary);
        font-size: 26px;
        margin: 0 0 8px 0;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
    }

    .booking-header p {
        font-size: 14px;
        color: #777;
        margin: 0;
    }

    .bf-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 25px;
    }

    .bf-group {
        display: flex;
        flex-direction: column;
    }

    .bf-group label {
        font-size: 13px;
        font-weight: 600;
        color: var(--secondary);
        margin-bottom: 6px;
        margin-left: 4px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .bf-input-wrapper {
        position: relative;
        display: flex;
        align-items: center;
    }

    .bf-icon {
        position: absolute;
        left: 15px;
        font-size: 18px;
        color: #888;
        z-index: 10;
        pointer-events: none;
        display: flex;
        align-items: center;
        height: 100%;
    }

    .bf-group input,
    .bf-group select {
        width: 100%;
        height: 50px;
        padding: 0 15px 0 50px !important;
        border: 2px solid var(--border-color) !important;
        border-radius: 10px !important;
        font-size: 15px !important;
        background-color: #f3f3f3 !important;
        color: #333 !important;
        transition: all 0.3s ease;
        outline: none;
        appearance: none;
    }

    .bf-group select {
        background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23333%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
        background-repeat: no-repeat;
        background-position: right 15px top 50%;
        background-size: 10px auto;
    }

    .bf-group input:focus,
    .bf-group select:focus {
        border-color: var(--primary) !important;
        box-shadow: 0 0 0 4px rgba(211, 84, 0, 0.1) !important;
        background-color: #fff !important;
    }

    .helper {
        font-size: 12px;
        color: #777;
        margin-top: 5px;
        margin-left: 5px;
    }

    .bf-footer {
        grid-column: span 2;
        background: #fff9f0;
        padding: 20px 25px;
        border-radius: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border: 1px solid #ffeeba;
        margin-top: 15px;
    }

    .total-box label {
        font-size: 12px;
        color: #666;
        display: block;
        margin-bottom: 0;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .total-box input {
        border: none !important;
        background: transparent !important;
        font-size: 28px !important;
        font-weight: 800 !important;
        color: var(--primary) !important;
        width: 150px;
        padding: 0 !important;
        height: auto !important;
        box-shadow: none !important;
    }

    .pay-btn {
        background: linear-gradient(135deg, var(--primary), var(--primary-hover));
        color: white;
        padding: 14px 40px;
        border-radius: 50px;
        font-size: 16px;
        font-weight: 700;
        border: none;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
        box-shadow: 0 5px 15px rgba(211, 84, 0, 0.3);
        display: inline-flex;
        align-items: center;
        gap: 8px;
    }

    .pay-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(211, 84, 0, 0.4);
    }

    @media (max-width: 768px) {
        .bf-grid { grid-template-columns: 1fr; gap: 20px; }
        .bf-footer { grid-column: span 1; flex-direction: column; gap: 20px; text-align: center; }
        .total-box input { text-align: center; }
        .pay-btn { width: 100%; justify-content: center; }
        .custom-booking-card { padding: 25px 20px; }
    }

    /* Modal */
    .modal-overlay {
        display: none;
        position: fixed; top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.7);
        z-index: 99999;
        justify-content: center; align-items: center;
        backdrop-filter: blur(5px);
    }
    .modal-content {
        background: white; padding: 30px; border-radius: 20px;
        width: 90%; max-width: 450px; text-align: center;
        box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        animation: zoomIn 0.3s ease;
    }
    .modal-list { background: #f8f9fa; padding: 15px; border-radius: 10px; margin: 20px 0; text-align: left; font-size: 14px; border: 1px solid #eee; }
    .modal-list p { margin: 8px 0; border-bottom: 1px dashed #e0e0e0; padding-bottom: 8px; display: flex; justify-content: space-between; }
    .whatsapp-btn-modal {
        background: #25D366; color: white; border: none; padding: 14px;
        border-radius: 50px; width: 100%; font-weight: 700; cursor: pointer;
        display: flex; align-items: center; justify-content: center; gap: 10px;
        font-size: 16px;
        text-decoration: none;
    }
    @keyframes zoomIn { from {transform: scale(0.9); opacity: 0;} to {transform: scale(1); opacity: 1;} }
</style>

<script>
    let currentOrderId = "";

    window.onload = function() {
        var today = new Date();
        var dd = String(today.getDate()).padStart(2, '0');
        var mm = String(today.getMonth() + 1).padStart(2, '0');
        var yyyy = today.getFullYear();
        var todayString = yyyy + '-' + mm + '-' + dd;
        var dateEl = document.getElementById("date");
        if (dateEl) dateEl.setAttribute("min", todayString);
        calculateTotal();
    };

    function calculateTotal() {
        var pickupSelect = document.getElementById("pickup");
        var packageSelect = document.getElementById("packageType");
        var seatsInput = document.getElementById("seats");
        var totalDisplay = document.getElementById("totalAmount");
        var priceInfo = document.getElementById("price_info");

        var zone = "western";
        if (pickupSelect.selectedIndex !== -1) {
            var selectedOption = pickupSelect.options[pickupSelect.selectedIndex];
            if (selectedOption.getAttribute('data-zone')) {
                zone = selectedOption.getAttribute('data-zone');
            }
        }

        var packageType = packageSelect.value;
        var seats = parseInt(seatsInput.value) || 1;
        var pricePerPerson = 0;

        if (zone === "western" || zone === "central" || zone === "south") {
            if (packageType === "basic") pricePerPerson = 200;
            else if (packageType === "ac_no_food") pricePerPerson = 300;
            else if (packageType === "sky") pricePerPerson = 450;
            else if (packageType === "star") pricePerPerson = 550;
        } else if (zone === "navi") {
            if (packageType === "basic") pricePerPerson = 250;
            else if (packageType === "ac_no_food") pricePerPerson = 350;
            else if (packageType === "sky") pricePerPerson = 500;
            else if (packageType === "star") pricePerPerson = 600;
        }

        if (priceInfo) {
            priceInfo.innerText = "Price per person: ₹" + pricePerPerson;
        }

        var total = pricePerPerson * seats;
        totalDisplay.value = "₹" + total;
    }

    async function initiatePayment() {
        var name    = document.getElementById("name").value;
        var phone   = document.getElementById("phone").value;
        var date    = document.getElementById("date").value;
        var pickup  = document.getElementById("pickup").value;
        var totalAmtString = document.getElementById("totalAmount").value;
        var packageSelect  = document.getElementById("packageType");
        var packageName    = packageSelect.options[packageSelect.selectedIndex].text;
        var seats   = document.getElementById("seats").value;

        if (!name || !date || !pickup || !phone) {
            alert("Please fill in all details"); return;
        }
        var phonePattern = /^[6-9]\d{9}$/;
        if (!phonePattern.test(phone)) {
            alert("Please enter a valid 10-digit mobile number."); return;
        }

        var totalAmt = parseInt(totalAmtString.replace("₹", ""));

        if (!totalAmt || totalAmt <= 0) {
            alert("Please select a valid package and pickup location."); return;
        }

        // Save booking details for WhatsApp message after redirect
        localStorage.setItem('pendingBooking', JSON.stringify({
            name: name,
            phone: phone,
            date: date,
            pickup: pickup,
            package: packageName,
            seats: seats,
            total: totalAmtString
        }));

        // Disable button to prevent double clicks
        var btn = document.querySelector('.pay-btn');
        btn.innerHTML = "⏳ Processing...";
        btn.disabled = true;

        try {
            // Step 1: Create order on backend PHP file
            const res = await fetch('/cashfree-order.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ amount: totalAmt, name: name, phone: phone })
            });

            const data = await res.json();
            const paymentSessionId = data.payment_session_id;
            currentOrderId = data.order_id;

            if (!paymentSessionId) {
                alert("Payment initiation failed. Please try again.");
                btn.innerHTML = "Proceed to Pay ➔";
                btn.disabled = false;
                return;
            }

            // Step 2: Open Cashfree checkout
            const cashfree = Cashfree({ mode: "production" }); // Change to "sandbox" for testing
            cashfree.checkout({
                paymentSessionId: paymentSessionId,
                redirectTarget: "_self"
            });

        } catch (error) {
            console.error("Payment Error:", error);
            alert("Something went wrong. Please try again.");
            btn.innerHTML = "Proceed to Pay ➔";
            btn.disabled = false;
        }
    }

    // Called after successful payment (if you use popup mode instead of redirect)
    function handleSuccess(orderId) {
        currentOrderId = orderId;
        var btn = document.querySelector('.pay-btn');
        if (btn) { btn.innerHTML = "✅ Paid"; btn.style.background = "#27ae60"; btn.disabled = true; }

        sendEmailToAdmin(orderId);

        var name = document.getElementById("name").value;
        var date = document.getElementById("date").value;
        var pickup = document.getElementById("pickup").value;
        var seats = document.getElementById("seats").value;
        var total = document.getElementById("totalAmount").value;
        var packageSelect = document.getElementById("packageType");
        var pkgName = packageSelect.options[packageSelect.selectedIndex].text;

        var detailsHTML = `
            <p><strong>Name:</strong> <span>${name}</span></p>
            <p><strong>Date:</strong> <span>${date}</span></p>
            <p><strong>Package:</strong> <span>${pkgName}</span></p>
            <p><strong>Pickup:</strong> <span>${pickup.split('(')[0]}</span></p>
            <p><strong>Seats:</strong> <span>${seats}</span></p>
            <p><strong>Total Paid:</strong> <span>${total}</span></p>
            <p><strong>Order ID:</strong> <span style="font-size:0.8rem">${orderId}</span></p>
        `;

        document.getElementById('bookingDetails').innerHTML = detailsHTML;
        document.getElementById('successModal').style.display = 'flex';
    }

    function sendEmailToAdmin(orderId) {
        var name = document.getElementById("name").value;
        var phone = document.getElementById("phone").value;
        var date = document.getElementById("date").value;
        var pickup = document.getElementById("pickup").value;
        var packageSelect = document.getElementById("packageType");
        var packageName = packageSelect.options[packageSelect.selectedIndex].text;
        var seats = document.getElementById("seats").value;
        var totalAmount = document.getElementById("totalAmount").value;

        var formData = new FormData();
        formData.append("access_key", "YOUR_WEB3FORMS_KEY"); // Your Web3Forms key
        formData.append("subject", "PAID Booking - " + name);
        formData.append("from_name", "Mumbai Darshan CO");
        formData.append("Order ID", orderId);
        formData.append("Name", name);
        formData.append("Phone", phone);
        formData.append("Date", date);
        formData.append("Pickup", pickup);
        formData.append("Package", packageName);
        formData.append("Seats", seats);
        formData.append("Total Paid", totalAmount);

        fetch("https://api.web3forms.com/submit", {
            method: "POST", body: formData
        }).catch(e => console.log("Email Error", e));
    }
